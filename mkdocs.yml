site_name: hgx
site_description: Hypergraph neural networks in JAX/Equinox
site_url: https://m9h.github.io/hgx
repo_url: https://github.com/m9h/hgx
repo_name: m9h/hgx

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Hypergraph: api/hypergraph.md
      - Convolution Layers: api/conv.md
      - Model: api/model.md
      - Dynamic Topology: api/dynamic.md
      - Transforms: api/transforms.md
      - Sparse Utilities: api/sparse.md
      - Visualization: api/viz.md
