name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      JAX_PLATFORM_NAME: cpu
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv venv
      - run: uv pip install -e ".[tests,viz,dynamics]"
      - run: uv pip install ruff pyright
      - name: Ruff Lint
        run: uv run ruff check hgx/
      - name: Pyright Type Check
        run: uv run pyright hgx/ test/
      - name: Fast Tests (No Network)
        run: uv run pytest test/ -k "not slow" -v --tb=short
      - name: Slow Tests (Network, Allowed to Fail)
        run: uv run pytest test/ -m slow -v --tb=short || true
