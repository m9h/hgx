name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORM_NAME: cpu
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv venv
      - run: uv pip install -e ".[tests,viz,dynamics]"
      - run: uv pip install ruff
      - run: uv run ruff check hgx/
      - run: uv run pytest test/ -v --tb=short
